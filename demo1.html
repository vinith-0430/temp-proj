<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Frontend</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        .hero h1 {
            font-size: 48px;
        }

        .hero p {
            font-size: 20px;
            margin: 20px 0;
        }

        .btn {
            padding: 12px 25px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <h2>MyWebsite</h2>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>Build amazing things with HTML, CSS, and JavaScript.</p>
        <a href="#" class="btn">Get Started</a>
    </section>

    <footer>
        <p>© 2026 MyWebsite. All rights reserved.</p>
    </footer>

</body>

</html>
